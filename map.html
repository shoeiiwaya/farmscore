<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmScore — 農地ポテンシャル診断マップ</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafaf5; }

  #header {
    background: white; border-bottom: 1px solid #e5e7eb; padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000;
  }
  #header h1 { font-size: 20px; color: #15803d; }
  #header h1 span { font-size: 24px; }

  #main { display: flex; height: calc(100vh - 52px); }

  #map { flex: 1; min-width: 0; }

  #sidebar {
    width: 420px; overflow-y: auto; padding: 20px; background: white;
    border-left: 1px solid #e5e7eb; flex-shrink: 0;
  }

  .control-group { margin-bottom: 16px; }
  .control-group label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 4px; font-weight: 600; }
  .control-group input, .control-group select {
    width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px;
  }
  .control-row { display: flex; gap: 8px; }
  .control-row .control-group { flex: 1; }

  #btn-score {
    width: 100%; padding: 12px; background: #16a34a; color: white; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 16px;
  }
  #btn-score:hover { background: #15803d; }
  #btn-score:disabled { opacity: 0.5; cursor: wait; }

  .samples { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .sample-btn {
    padding: 4px 10px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 20px;
    font-size: 11px; cursor: pointer; color: #374151;
  }
  .sample-btn:hover { background: #dcfce7; border-color: #86efac; color: #15803d; }

  /* Results */
  #results { display: none; }

  .overall-box {
    text-align: center; padding: 20px; border-radius: 12px; margin-bottom: 16px;
    border: 2px solid #e5e7eb;
  }
  .overall-score { font-size: 48px; font-weight: 800; }
  .overall-grade {
    display: inline-block; width: 44px; height: 44px; border-radius: 50%; color: white;
    font-size: 20px; font-weight: 800; line-height: 44px; text-align: center; margin-right: 12px;
  }
  .grade-S { background: #22c55e; } .grade-A { background: #3b82f6; }
  .grade-B { background: #f59e0b; } .grade-C { background: #f97316; } .grade-D { background: #ef4444; }

  .score-card {
    border-radius: 10px; padding: 14px; margin-bottom: 10px; border: 1px solid;
  }
  .score-card h3 { font-size: 14px; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .score-card h3 .num { font-size: 20px; font-weight: 800; }
  .score-card p { font-size: 12px; margin: 2px 0; color: inherit; opacity: 0.85; }

  .card-green  { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
  .card-blue   { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
  .card-amber  { background: #fffbeb; border-color: #fde68a; color: #92400e; }
  .card-red    { background: #fef2f2; border-color: #fecaca; color: #991b1b; }

  .crop-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 12px; }
  .crop-table th { text-align: left; padding: 8px; background: #f0fdf4; color: #166534; border-bottom: 1px solid #dcfce7; }
  .crop-table td { padding: 8px; border-bottom: 1px solid #f3f4f6; }
  .crop-score {
    display: inline-block; padding: 2px 8px; border-radius: 12px; font-weight: 700; font-size: 11px;
  }

  .disclaimer { font-size: 10px; color: #9ca3af; margin-top: 16px; text-align: center; }

  #loading { display: none; text-align: center; padding: 40px; color: #6b7280; }
  #loading .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid #e5e7eb; border-top-color: #16a34a; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  #instructions { text-align: center; padding: 60px 20px; color: #9ca3af; }
  #instructions .icon { font-size: 48px; margin-bottom: 12px; }
  #instructions h2 { color: #6b7280; font-size: 16px; margin-bottom: 8px; }

  @media (max-width: 768px) {
    #main { flex-direction: column; }
    #sidebar { width: 100%; height: 50vh; }
    #map { height: 50vh; }
  }
</style>
</head>
<body>

<div id="header">
  <h1><span>🌱</span> FarmScore</h1>
  <div style="font-size:12px;color:#9ca3af">農地ポテンシャル診断マップ</div>
</div>

<div id="main">
  <div id="map"></div>
  <div id="sidebar">
    <div class="control-row">
      <div class="control-group">
        <label>緯度</label>
        <input type="number" id="lat" value="35.4437" step="0.0001">
      </div>
      <div class="control-group">
        <label>経度</label>
        <input type="number" id="lon" value="139.6380" step="0.0001">
      </div>
    </div>
    <div class="control-group">
      <label>対象作物</label>
      <select id="crop">
        <option value="">読み込み中...</option>
      </select>
    </div>
    <button id="btn-score" onclick="doScore()">🔍 診断する</button>

    <div class="samples">
      <span style="font-size:11px;color:#9ca3af;align-self:center">サンプル:</span>
      <button class="sample-btn" onclick="goTo(35.3964,139.5309)">横浜 戸塚</button>
      <button class="sample-btn" onclick="goTo(35.0465,139.857)">千葉 南房総</button>
      <button class="sample-btn" onclick="goTo(36.0835,140.0764)">茨城 つくば</button>
      <button class="sample-btn" onclick="goTo(36.2381,137.972)">長野 松本</button>
      <button class="sample-btn" onclick="goTo(37.0667,138.95)">新潟 魚沼</button>
      <button class="sample-btn" onclick="goTo(42.9236,143.1966)">北海道 十勝</button>
      <button class="sample-btn" onclick="goTo(34.7421,138.221)">静岡 牧之原</button>
      <button class="sample-btn" onclick="goTo(31.7275,131.0621)">宮崎 都城</button>
    </div>

    <div id="instructions">
      <div class="icon">🗺️</div>
      <h2>地図をクリックして診断</h2>
      <p>地図上の任意の地点をクリック、<br>またはサンプル地点を選んでください</p>
    </div>

    <div id="loading">
      <div class="spinner"></div>
      <p style="margin-top:12px">分析中...</p>
    </div>

    <div id="results"></div>
  </div>
</div>

<script>
// Auto-detect: use deployed API if not running locally
const API = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
  ? 'http://localhost:8000'
  : 'https://farmscore.onrender.com';

// Load crops dynamically from API
(async function loadCrops() {
  const sel = document.getElementById('crop');
  try {
    const res = await fetch(API + '/v1/demo/crops');
    const data = await res.json();
    // Group by category
    const groups = {};
    for (const [key, info] of Object.entries(data)) {
      const cat = info.category || '未分類';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push({key, name_ja: info.name_ja});
    }
    sel.innerHTML = '<option value="">指定なし（全作物比較）</option>';
    const catOrder = ['穀物','果菜類','葉菜類','根菜類','果樹','豆類','工芸作物','花卉','ハーブ','きのこ類','飼料作物'];
    const cats = Object.keys(groups).sort((a,b) => {
      const ai = catOrder.indexOf(a), bi = catOrder.indexOf(b);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
    for (const cat of cats) {
      const og = document.createElement('optgroup');
      og.label = `${cat}（${groups[cat].length}）`;
      groups[cat].sort((a,b) => a.name_ja.localeCompare(b.name_ja, 'ja'));
      for (const crop of groups[cat]) {
        const opt = document.createElement('option');
        opt.value = crop.key;
        opt.textContent = crop.name_ja;
        og.appendChild(opt);
      }
      sel.appendChild(og);
    }
  } catch (e) {
    sel.innerHTML = '<option value="">指定なし</option>';
    console.warn('Crop list load failed:', e);
  }
})();

// Map setup
const map = L.map('map').setView([35.4437, 139.638], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// Layer control
const gsiPale = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {attribution: '&copy; 国土地理院', maxZoom: 18});
const gsiPhoto = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {attribution: '&copy; 国土地理院', maxZoom: 18});
L.control.layers({
  'OpenStreetMap': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map),
  '地理院 淡色': gsiPale,
  '地理院 航空写真': gsiPhoto,
}).addTo(map);

let marker = L.marker([35.4437, 139.638], {draggable: true}).addTo(map);
let scoreCircle = null;

marker.on('dragend', () => {
  const p = marker.getLatLng();
  document.getElementById('lat').value = p.lat.toFixed(4);
  document.getElementById('lon').value = p.lng.toFixed(4);
});

map.on('click', (e) => {
  marker.setLatLng(e.latlng);
  document.getElementById('lat').value = e.latlng.lat.toFixed(4);
  document.getElementById('lon').value = e.latlng.lng.toFixed(4);
  doScore();
});

function goTo(lat, lon) {
  document.getElementById('lat').value = lat;
  document.getElementById('lon').value = lon;
  marker.setLatLng([lat, lon]);
  map.setView([lat, lon], 11);
  doScore();
}

function cardClass(score) {
  if (score >= 75) return 'card-green';
  if (score >= 55) return 'card-blue';
  if (score >= 40) return 'card-amber';
  return 'card-red';
}

function scoreBadgeColor(score) {
  if (score >= 75) return 'background:#dcfce7;color:#166534';
  if (score >= 55) return 'background:#dbeafe;color:#1e40af';
  if (score >= 40) return 'background:#fef3c7;color:#92400e';
  return 'background:#fecaca;color:#991b1b';
}

async function doScore() {
  const lat = parseFloat(document.getElementById('lat').value);
  const lon = parseFloat(document.getElementById('lon').value);
  const crop = document.getElementById('crop').value;
  const btn = document.getElementById('btn-score');

  btn.disabled = true;
  btn.textContent = '分析中...';
  document.getElementById('instructions').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  try {
    let url = `${API}/v1/demo/score?lat=${lat}&lon=${lon}`;
    if (crop) url += `&crop=${crop}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('API error');
    const d = await res.json();
    renderResults(d);

    // Update map
    marker.setLatLng([lat, lon]);
    if (scoreCircle) map.removeLayer(scoreCircle);
    const color = d.grade === 'S' ? '#22c55e' : d.grade === 'A' ? '#3b82f6' : d.grade === 'B' ? '#f59e0b' : d.grade === 'C' ? '#f97316' : '#ef4444';
    scoreCircle = L.circle([lat, lon], {radius: 500, color, fillColor: color, fillOpacity: 0.15, weight: 2}).addTo(map);
    marker.bindPopup(`<div style="text-align:center"><b style="font-size:24px">${Math.round(d.overall_score)}</b><span style="font-size:12px">点</span><br><b>グレード ${d.grade}</b><br><span style="font-size:11px;color:#999">${d.elevation.landform} ${d.elevation.elevation_m}m</span></div>`).openPopup();

  } catch(e) {
    document.getElementById('results').innerHTML = `<div style="background:#fef2f2;color:#991b1b;padding:16px;border-radius:10px;text-align:center"><b>エラー</b><br>APIに接続できません。<br><code style="font-size:11px">python3 run_local.py</code> を起動してください。</div>`;
    document.getElementById('results').style.display = 'block';
  }

  document.getElementById('loading').style.display = 'none';
  btn.disabled = false;
  btn.textContent = '🔍 診断する';
}

function renderResults(d) {
  const el = document.getElementById('results');
  el.style.display = 'block';

  let html = `
    <div class="overall-box" style="border-color:${d.grade === 'S' ? '#22c55e' : d.grade === 'A' ? '#3b82f6' : '#f59e0b'}">
      <span class="overall-grade grade-${d.grade}">${d.grade}</span>
      <span class="overall-score">${Math.round(d.overall_score)}</span><span style="color:#9ca3af;font-size:16px">/100</span>
      <div style="font-size:12px;color:#6b7280;margin-top:4px">${d.elevation.landform}（標高${d.elevation.elevation_m}m）</div>
    </div>

    <div class="score-card ${cardClass(d.soil_score)}">
      <h3><span>🪨 土壌</span><span class="num">${Math.round(d.soil_score)}</span></h3>
      <p><b>${d.soil.soil_type}</b>（${d.soil.soil_group}）</p>
      <p>pH: ${d.soil.ph_range} / 排水: ${d.soil.drainage} / 有機物: ${d.soil.organic_matter}</p>
      <p style="font-size:11px;margin-top:4px">${d.soil.suitability_notes}</p>
    </div>

    <div class="score-card ${cardClass(d.climate_score)}">
      <h3><span>🌤️ 気候</span><span class="num">${Math.round(d.climate_score)}</span></h3>
      <p>年平均 ${d.climate.annual_temp_avg}°C / 降水 ${d.climate.annual_precip_mm}mm / 無霜 ${d.climate.frost_free_days}日</p>
      <p>GDD: ${d.climate.growing_degree_days} / 霜: ${d.climate.frost_risk} / 台風: ${d.climate.typhoon_risk}</p>
    </div>

    <div class="score-card ${cardClass(d.water_score)}">
      <h3><span>💧 水利</span><span class="num">${Math.round(d.water_score)}</span></h3>
      <p>${d.water.river_name}（${d.water.nearest_river_km}km） / 洪水: ${d.water.flood_risk_zone}</p>
      <p>地下水: ${d.water.groundwater_depth_est}</p>
      <p>${d.water.irrigation_accessibility}</p>
    </div>

    <div class="score-card ${cardClass(d.sunlight_score)}">
      <h3><span>☀️ 日照</span><span class="num">${Math.round(d.sunlight_score)}</span></h3>
      <p>年間 ${d.sunlight.annual_sunshine_hours}時間 / ${d.sunlight.avg_daily_radiation_mj} MJ/m²/日</p>
      <p>方位: ${d.sunlight.aspect} / 傾斜: ${d.sunlight.slope_deg}°</p>
    </div>

    <div class="score-card ${cardClass(d.elevation_score)}">
      <h3><span>⛰️ 標高・地形</span><span class="num">${Math.round(d.elevation_score)}</span></h3>
      <p>${d.elevation.elevation_m}m / ${d.elevation.landform} / 傾斜${d.elevation.slope_deg}° ${d.elevation.aspect}</p>
    </div>

    ${d.realtime_weather ? `
    <div class="score-card" style="border-left:3px solid #0ea5e9">
      <h3><span>📡 リアルタイム気象</span><span style="font-size:11px;color:#6b7280">${d.realtime_weather.station_name}（${d.realtime_weather.station_distance_km}km）</span></h3>
      <p>
        ${d.realtime_weather.temp_current !== null ? `気温 <b>${d.realtime_weather.temp_current}°C</b>` : ''}
        ${d.realtime_weather.humidity !== null ? ` / 湿度 <b>${d.realtime_weather.humidity}%</b>` : ''}
        ${d.realtime_weather.precipitation_1h !== null ? ` / 降水 <b>${d.realtime_weather.precipitation_1h}mm/h</b>` : ''}
      </p>
      <p style="font-size:11px;color:#6b7280">
        ${d.realtime_weather.wind_speed !== null ? `風速 ${d.realtime_weather.wind_speed}m/s` : ''}
        ${d.realtime_weather.sunshine_1h !== null ? ` / 日照 ${d.realtime_weather.sunshine_1h}h` : ''}
        — データ: ${d.realtime_weather.source}
      </p>
    </div>
    ` : ''}

    <table class="crop-table">
      <tr><th colspan="3">🌾 おすすめ作物</th></tr>
      ${d.crop_recommendations.map(c => `
        <tr>
          <td style="font-weight:600">${c.crop_name}</td>
          <td><span class="crop-score" style="${scoreBadgeColor(c.suitability_score)}">${Math.round(c.suitability_score)}</span></td>
          <td style="font-size:11px;color:#6b7280">${c.expected_yield_relative}</td>
        </tr>
      `).join('')}
    </table>

    ${d.data_sources ? `
    <div style="margin-top:12px;padding:10px;background:#f0fdf4;border-radius:8px;font-size:10px;color:#6b7280">
      <b style="color:#15803d">データソース:</b><br>
      ${Object.entries(d.data_sources).filter(([,v])=>v).map(([k,v])=>`• ${v}`).join('<br>')}
    </div>
    ` : ''}

    <p class="disclaimer">${d.disclaimer}</p>
  `;
  el.innerHTML = html;
}
</script>
</body>
</html>
